{% extends "layout.html" %}

{% block conteudo %}

    <!-- HTML DA PÁGINA DE EDITAR DADOS -->


    <!-- SUBHEADER -->
    <div class="subheader mutavel"> Editar minhas listas </div>

    <!-- BARRA DE NAVEGAÇÃO SECUNDÁRIA ENTRE ABAS -->
    <nav class="nav2">
        <button class="nav2-link"
            hx-get="/editar/filmes"
            hx-target=".caixa1"
            hx-trigger="click"
            id="aba-filmes"
        > Filmes </button>
        <button class="nav2-link"
            hx-get="/editar/ator"
            hx-target=".caixa1"
            hx-trigger="click"
            id="aba-atores"
        > Atores </button>
        <button class="nav2-link"
            hx-get="/editar/diretor"
            hx-target=".caixa1"
            hx-trigger="click"
            id="aba-diretores"
        > Diretores </button>

    </nav>

    <!-- DIV QUE CONTÉM AS CAIXAS DE CRIAÇÃO, ATUALIZAÇÃO E DELEÇÃO DO BANCO DE DADOS -->
    <div class="caixa1"
         hx-get="{{ pagina }}"
         hx-target=".caixa1"
         hx-trigger="load">
    </div>
{% endblock %}
