<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Jupiterweb</title>
    <style>
        body {
            font-family: Cambria, Cochin, Georgia, Times, 'Times New Roman', serif
        }

        header {
            display: flex;
        }

        #line1 {
            background-color: rgb(251, 181, 33);
            height: 5px;
            width: 100%;
        }
        #line2 {
            background-color: rgb(100, 196, 211);
            height: 5px;
            width: 100%;
        }
        #line3 {
            background-color: rgb(16, 148, 171);
            height: 10px;
            width: 100%;
        }

        main {
            margin: 20px 0px;
            padding: 0;
            display: flex;
            justify-content: space-between;
        }
        nav {
            display: flex;
            flex-direction: column;
            align-items: center;
            margin: 2px;
        }
        .nav-box{
            margin: 2px;
            border: 2px solid grey;
            display: flex;
            flex-direction: column;
            align-items: center;
            width: 180px;
            border-radius: 5px;
        }
        .nav-box-top {
            margin: 1px 1px;
            border-radius: 2px;
            background-color: rgb(16, 148, 171);
            width: 98%;
            text-align: center;
            line-height: 35px;
        }

        .nav-buttons {
            width: 100%;
            text-align: center;
            cursor: pointer;
            line-height: 35px;
            text-decoration: none;
            color: black;
        }

        .nav-buttons:hover {
            background-color: rgb(167, 206, 211);
            display: block;
        }

        form {
            display: flex;
            flex-direction: column;
            align-items: center;
        }
        .div-form {
            flex: 1;
            padding: 0px 5px;
        }
        .text-input {
            width: 180px;
            height: 30px;
            border-radius: 40px;
            margin: 5px;
            display: flex;
            justify-content: center;
            align-items: center; 
            font-size: 18px;
            text-align: center;
        }

        .entrar {
            width: 150px;
            height: 28px;
            font-size: 17px;
            border-radius: 40px;
        }

        .entrar:hover {
            cursor: pointer;
            background-color: rgb(167, 206, 211);
        }

        .entrar:active {
            cursor: pointer;
            background-color: rgb(152, 204, 211);
        }

        footer {
            text-align: center;
            margin-top: 30px;
        }

        #rodape1 {
            margin-bottom: 2px;
        }

        #rodape2 {
            font-size: 12px;
            margin: 2px;
        }

        .footer-link {
            color: olive;
        }

        @media (max-width: 600px) {
            main {
                flex-direction: column;
            }
            header {
                flex-direction: column;
                align-items: center;
            }

            .nav-box{
                width: 90%;
                border-radius: 3%;
            }

        }

    
    </style>
</head>
<body>
    <header>
        <div></div>
        <img style="width: 130px; margin-left: 20px; margin-bottom: 10px;" src="https://uspdigital.usp.br/comumwebdev/imagens/cabecalho/usp-logo.png">
        <img style="width: 260px; margin-left: 30px; margin-bottom: 5px;" src="https://uspdigital.usp.br/comumwebdev/imagens/cabecalho/usp-logo-texto.png">
    </header>

    <div id="line1"></div>
    <div id="line2"></div>
    <div id="line3"></div>

    <main>
        <nav>
            <div class="nav-box">
                <div class="nav-box-top">Público</div>
                <a class="nav-buttons" href="https://uspdigital.usp.br/jupiterweb/jupArquivosPublicos.jsp?tiparq=9&anoprg=2026&codmnu=6863">Calendário Escolar</a>
                <a class="nav-buttons" href="https://uspdigital.usp.br/jupiterweb/jupCarreira.jsp?codmnu=8275">Cursos de ingresso</a>
                <a class="nav-buttons" href="https://uspdigital.usp.br/jupiterweb/jupDisciplinaBusca?tipo=D&codmnu=6755">Disciplina</a>
                <a class="nav-buttons" href="https://uspdigital.usp.br/juno/bnfArquivosPublicos.jsp?tiparq=1&anoprg=2025&codm?codmnu=11502">Editais</a>
                <a class="nav-buttons" href="http://www.prg.usp.br/?p=20741&codmnu=8063">FAQ</a>
            </div>
            <div class="nav-box">
                <div class="nav-box-top">Acesso Restrito</div>
                <a class="nav-buttons" href="https://uspdigital.usp.br/jupiterweb/webLogin.jsp">Entrar</a>
                <a class="nav-buttons" href="https://uspdigital.usp.br/jupiterweb/esqueciSenha">Esqueci a Senha</a>
                <a class="nav-buttons" href="https://uspdigital.usp.br/jupiterweb/primeiroAcesso">Primeiro Acesso</a>
            </div>
        </nav>
        <div class="div-form">
            <p style="margin-bottom: 2px;">Login</p>
            <hr>
            <br>
            <form>
                <input type="text" class="text-input" placeholder="Usuário">
                <input type="password" class="text-input" placeholder="Senha">
                <input type="submit" value="Entrar" class="entrar">

            </form>
            <footer>
                <hr>
                <p id="rodape1"><a class="footer-link" href="https://uspdigital.usp.br/jupiterweb/creditos.jsp">Créditos</a> | <a class="footer-link" href="https://uspdigital.usp.br/jupiterweb/jupColegiadoEmailLista">Fale conosco</a></p>
                <p id="rodape2">© 1999 - 2026 - Superintendência de Tecnologia da Informação/USP</p>
            </footer>
        </div>
    </main>
    
</body>
</html>
