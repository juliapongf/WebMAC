<DOCTYPE html>
<html lang="pt-br">
    <head>
        <title>Meu Site</title>
        <link rel="stylesheet" href="/static/styles.css">
        <script src="https://cdn.jsdelivr.net/npm/htmx.org@2.0.8/dist/htmx.js" integrity="sha384-ezjq8118wdwdRMj+nX4bevEi+cDLTbhLAeFF688VK8tPDGeLUe0WoY2MZtSla72F" crossorigin="anonymous"></script>
    </head>
    <body>
        <header class="headerr">
            <h1>AULA 8</h1>
            <nav>
                <button hx-get="/home/curtidas"
                        hx-target="main"
                        hx-push-url="true"
                        id="aba-curtidas">
                    Curtidas
                </button>
                <button hx-get="/home/pagina1"
                        hx-target="main"
                        hx-push-url="true"
                        id="aba-jupiter">
                    Página 1
                </button>
                <button hx-get="/home/pagina2"
                        hx-target="main"
                        hx-push-url="true"
                        id="aba-prof">
                    Página 2
                </button>
            </nav>
        </header>
        <hr>
        <main hx-get="{{ pagina }}"
              hx-target="main"
              hx-trigger="load">
        </main>

        <div hx-get="/abas"
            hx-target="main"
            hx-swap="innerHTML"
            hx-trigger="keyup[shiftKey && altKey && (key=='p'||key=='P')] from:body">
        </div>
    </body>
</html>
