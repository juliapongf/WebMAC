<div>
    <input type="text" 
        name="busca" 
        placeholder="Buscar..."
        hx-get="/lista"
        hx-trigger="input changed delay:500ms"
        hx-select="#lista"
        hx-target="#lista"
        hx-indicator="#indicator">

    <span id="indicator" class="htmx-indicator">Carregando...</span>
</div>
<div id="lista">
    <ul>
        {% for aluno in alunos %}
            <li>{{ aluno.id }} {{ aluno.nome }}</li>
        {% else %}
            <li>Não há alunos</li>
        {% endfor %}
    </ul>
    {% if temanterior %}
        <button hx-get="/lista?busca={{ busca }}&pagina={{ pagina - 1 }}"
                hx-target="#lista"
                hx-select="#lista"
                >Anterior</button>
    {% endif%}
    {% if temproximo %}
        <button hx-get="/lista?busca={{ busca }}&pagina={{ pagina + 1 }}"
                hx-target="#lista"
                hx-select="#lista">
                Próximo</button>
    {% endif %}
</div>
